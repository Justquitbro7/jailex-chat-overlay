<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAILEX KICK CHAT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100vh;
            width: 100vw;
            background: transparent !important; /* 0% opacity */
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        
        #chat-feed {
            height: 100vh;
            width: 100vw;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none; /* hide scrollbar in OBS */
        }
        
        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeIn 0.4s ease forwards;
            max-width: 95%;
        }
        
        .kick-badge {
            background: #53FC18;
            color: #000;
            font-size: 13px;
            font-weight: 900;
            padding: 3px 9px;
            border-radius: 6px;
            letter-spacing: 1px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .username {
            font-weight: 700;
            color: #53FC18;
            font-size: 18px;
            white-space: nowrap;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .text {
            font-size: 18px;
            line-height: 1.35;
            word-break: break-word;
            flex: 1;
            background: rgba(0, 0, 0, 0.65); /* subtle readable background */
            padding: 8px 14px;
            border-radius: 10px;
            border-left: 4px solid #53FC18;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .empty {
            text-align: center;
            margin-top: 40vh;
            color: rgba(255,255,255,0.4);
            font-size: 17px;
        }
    </style>
</head>
<body>
    <div id="chat-feed">
        <div class="empty">Waiting for Kick chats...<br><small>justquitbro7 • Room 92474944</small></div>
    </div>

    <script src="https://js.pusher.com/8.4.0-rc2/pusher.min.js"></script>
    <script>
        const KICK_USER = "justquitbro7";
        const KICK_ROOM = "92474944";
        
        function addMessage(username, message) {
            const feed = document.getElementById('chat-feed');
            const empty = feed.querySelector('.empty');
            if (empty) empty.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            msgDiv.innerHTML = `
                <span class="kick-badge">KICK</span>
                <span class="username">${username}</span>
                <span class="text">${message}</span>
            `;
            
            feed.appendChild(msgDiv);
            feed.scrollTop = feed.scrollHeight;
            
            // Keep only last 60 messages
            if (feed.children.length > 60) feed.removeChild(feed.children[0]);
        }
        
        // Hard-coded Kick connection
        function connectKick() {
            console.log('%c🚀 JAILEX KICK OVERLAY CONNECTED', 'color:#53FC18;font-weight:900');
            
            try {
                const pusher = new Pusher('32cbd69e4b950bf97679', { cluster: 'us2' });
                const channel = pusher.subscribe(`chatrooms.${KICK_ROOM}.v2`);
                
                channel.bind('App\\Events\\ChatMessageEvent', (data) => {
                    const username = data.sender.username || "KickUser";
                    const message = data.content || "";
                    if (message.trim()) addMessage(username, message);
                });
                
                console.log('✅ Kick chat connected successfully');
            } catch(e) {
                console.error('Kick connection error', e);
            }
        }
        
        window.onload = () => {
            connectKick();
            
            // Auto-reconnect every 4 minutes just in case
            setInterval(() => {
                console.log('🔄 Auto-reconnect check');
            }, 240000);
        };
    </script>
</body>
</html>
