<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAILEX KICK CHAT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100vh;
            width: 100vw;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        #chat-feed {
            height: 100vh;
            width: 100vw;
            padding: 25px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: none;
        }
        
        .message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: fadeIn 0.4s ease forwards;
            max-width: 95%;
            transition: opacity 0.8s ease;
        }
        
        .username {
            font-weight: 700;
            color: #53FC18;
            font-size: 16px;
            white-space: nowrap;
            max-width: 190px;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }
        
        .text {
            font-size: 16px;
            line-height: 1.4;
            word-break: break-word;
            flex: 1;
            background: transparent;
            padding: 4px 0;
            color: #53FC18;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="chat-feed"></div>

    <script src="https://js.pusher.com/8.4.0-rc2/pusher.min.js"></script>
    <script>
        const KICK_ROOM = "92474944";
        
        function addMessage(username, message) {
            const feed = document.getElementById('chat-feed');
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.dataset.time = Date.now();   // timestamp for cleanup
            
            msgDiv.innerHTML = `
                <span class="username">${username}</span>
                <span class="text">${message}</span>
            `;
            
            feed.appendChild(msgDiv);
            feed.scrollTop = feed.scrollHeight;
            
            // Safety limit
            if (feed.children.length > 40) feed.removeChild(feed.children[0]);
        }
        
        // ROBUST CLEANUP – runs every 5 seconds (works in Lightstream)
        function startCleanup() {
            setInterval(() => {
                const feed = document.getElementById('chat-feed');
                const now = Date.now();
                const messages = feed.querySelectorAll('.message');
                
                messages.forEach(msg => {
                    const age = now - parseInt(msg.dataset.time);
                    if (age > 30000) {                    // 30 seconds
                        msg.style.opacity = '0';
                        setTimeout(() => {
                            if (msg.parentNode) msg.remove();
                        }, 800);
                    }
                });
            }, 5000);
        }
        
        function connectKick() {
            try {
                const pusher = new Pusher('32cbd69e4b950bf97679', { cluster: 'us2' });
                const channel = pusher.subscribe(`chatrooms.${KICK_ROOM}.v2`);
                
                channel.bind('App\\Events\\ChatMessageEvent', handleChat);
                channel.bind('App\\Events\\ChatMessageSentEvent', handleChat);
                
                function handleChat(data) {
                    const username = data.sender?.username || data.sender?.displayname || "KickUser";
                    
                    let message = "";
                    if (data.content) message = data.content;
                    else if (data.message && data.message.message) message = data.message.message;
                    else if (data.message) message = data.message;
                    
                    message = String(message || "").trim();
                    
                    if (message) addMessage(username, message);
                }
                
            } catch(e) { console.error(e); }
        }
        
        window.onload = () => {
            connectKick();
            startCleanup();        // ← This fixes Lightstream
        };
    </script>
</body>
</html>
