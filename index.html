<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAILEX KICK CHAT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100vh;
            width: 100vw;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        
        #status {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.7);
            color: #53FC18;
            font-size: 11px;
            padding: 6px 12px;
            text-align: center;
            font-weight: 600;
            z-index: 100;
            letter-spacing: 1px;
        }
        
        #chat-feed {
            height: 100vh;
            width: 100vw;
            padding: 20px;
            padding-top: 40px; /* space for status */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: none;
        }
        
        .message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: fadeIn 0.4s ease forwards;
            max-width: 95%;
        }
        
        .kick-badge {
            background: #53FC18;
            color: #000;
            font-size: 9px;
            font-weight: 900;
            padding: 2px 7px;
            border-radius: 4px;
            letter-spacing: 1px;
            flex-shrink: 0;
            margin-top: 3px;
        }
        
        .username {
            font-weight: 700;
            color: #53FC18;
            font-size: 12px;
            white-space: nowrap;
            max-width: 160px;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }
        
        .text {
            font-size: 12px;
            line-height: 1.4;
            word-break: break-word;
            flex: 1;
            background: transparent;
            padding: 4px 0;
            border-left: 3px solid #53FC18;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .empty {
            text-align: center;
            margin-top: 30vh;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="status">🔄 Connecting to Kick Chatroom 92474944...</div>
    
    <div id="chat-feed">
        <div class="empty">Waiting for messages...<br><small>Stream must be LIVE on Kick</small></div>
    </div>

    <script src="https://js.pusher.com/8.4.0-rc2/pusher.min.js"></script>
    <script>
        const KICK_ROOM = "92474944";
        
        function updateStatus(text, color = "#53FC18") {
            document.getElementById('status').innerHTML = text;
            document.getElementById('status').style.color = color;
        }
        
        function addMessage(username, message) {
            const feed = document.getElementById('chat-feed');
            const empty = feed.querySelector('.empty');
            if (empty) empty.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            msgDiv.innerHTML = `
                <span class="kick-badge">KICK</span>
                <span class="username">${username}</span>
                <span class="text">${message}</span>
            `;
            
            feed.appendChild(msgDiv);
            feed.scrollTop = feed.scrollHeight;
            
            if (feed.children.length > 60) feed.removeChild(feed.children[0]);
        }
        
        function connectKick() {
            updateStatus('🔄 Connecting to Kick Chatroom 92474944...');
            
            try {
                const pusher = new Pusher('32cbd69e4b950bf97679', { cluster: 'us2' });
                const channel = pusher.subscribe(`chatrooms.${KICK_ROOM}.v2`);
                
                channel.bind('App\\Events\\ChatMessageEvent', (data) => {
                    const username = data.sender?.username || data.sender?.displayname || "KickUser";
                    const message = data.content || "";
                    if (message.trim()) {
                        console.log('📨 New Kick message:', username, message);
                        addMessage(username, message);
                    }
                });
                
                channel.bind('pusher:subscription_succeeded', () => {
                    updateStatus('✅ CONNECTED — Waiting for chat messages (stream must be LIVE)', '#53FC18');
                    console.log('%c✅ Kick Pusher connected successfully', 'color:#53FC18;font-weight:900');
                });
                
                console.log('🚀 Attempting Kick connection...');
            } catch(e) {
                updateStatus('❌ CONNECTION ERROR — Check console (F12)', '#FF0000');
                console.error('Kick connection error', e);
            }
        }
        
        window.onload = () => {
            connectKick();
        };
    </script>
</body>
</html>
