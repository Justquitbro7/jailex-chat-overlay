<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAILEX KICK CHAT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100vh;
            width: 100vw;
            background: transparent !important;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        
        #chat-feed {
            height: 100vh;
            width: 100vw;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;           /* slightly more space for bigger text */
            scrollbar-width: none;
        }
        
        .message {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            animation: fadeIn 0.4s ease forwards;
            max-width: 95%;
        }
        
        .username {
            font-weight: 700;
            color: #53FC18;
            font-size: 16px;           /* 30% larger */
            white-space: nowrap;
            max-width: 190px;          /* a bit wider for bigger names */
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 3px;
        }
        
        .text {
            font-size: 16px;           /* 30% larger */
            line-height: 1.4;
            word-break: break-word;
            flex: 1;
            background: transparent;
            padding: 4px 0;
            color: #53FC18;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .empty {
            text-align: center;
            margin-top: 30vh;
            color: rgba(255,255,255,0.5);
            font-size: 18px;           /* 30% larger */
        }
    </style>
</head>
<body>
    <div id="chat-feed">
        <div class="empty">Waiting for messages...<br><small>Go live on Kick and type in chat</small></div>
    </div>

    <script src="https://js.pusher.com/8.4.0-rc2/pusher.min.js"></script>
    <script>
        const KICK_ROOM = "92474944";
        
        function addMessage(username, message) {
            const feed = document.getElementById('chat-feed');
            const empty = feed.querySelector('.empty');
            if (empty) empty.remove();
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            msgDiv.innerHTML = `
                <span class="username">${username}</span>
                <span class="text">${message}</span>
            `;
            
            feed.appendChild(msgDiv);
            feed.scrollTop = feed.scrollHeight;
            
            if (feed.children.length > 60) feed.removeChild(feed.children[0]);
        }
        
        function connectKick() {
            try {
                const pusher = new Pusher('32cbd69e4b950bf97679', { cluster: 'us2' });
                const channel = pusher.subscribe(`chatrooms.${KICK_ROOM}.v2`);
                
                channel.bind('App\\Events\\ChatMessageEvent', handleChat);
                channel.bind('App\\Events\\ChatMessageSentEvent', handleChat);
                
                function handleChat(data) {
                    const username = data.sender?.username || data.sender?.displayname || "KickUser";
                    
                    let message = "";
